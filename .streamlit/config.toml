[theme]
base = "dark"
primaryColor = "#ff6ec7"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161a2c"
textColor = "#e6e6e6"
font = "sans serif"

[server]
maxUploadSize = 10
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
